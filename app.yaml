# https://cloud.google.com/appengine/docs/standard/python3/runtime#python-3.8
runtime: python310
instance_class: F1

# It is not neccesary because search for main.py in root with object app 
# entrypoint: gunicorn -b:$PORT src.main:app 
# No incluyas gunicorn en requirements.txt, a menos que especifiques el entrypoint

# IMPORTANT: Do NOT hardcode secrets here. Use Google Cloud Secret Manager
# or set them via: gcloud app deploy --set-env-vars KEY=VALUE
# See: https://cloud.google.com/appengine/docs/standard/python3/config/appref#environment_variables
# NOTE: App Engine app.yaml does not support an `includes:` directive.
# If you want file-based credentials, use scripts/build_app_yaml.sh
# to generate app.deploy.yaml from this base file + credentials.yaml.
env_variables:
  FALKEN_VERSION: "1.0.0"
  ENV_PRO: "Y"
  LEVEL_LOG: "INFO, WARNING, ERROR"
  # Project that owns the secrets in Google Cloud Secret Manager.
  # Required when ENV_PRO=Y so src/config.py can resolve missing values
  # from Secret Manager instead of plain env vars.
  GCP_PROJECT_ID: "REPLACE_WITH_YOUR_GCP_PROJECT_ID"
  # API keys are NOT defined here. They live in Secret Manager and are read
  # at runtime by src/config.py. See docs/SECRET_MANAGER.md.
  # Secrets expected: API_KEY_WUNDERGROUND, STATION_ID, API_KEY_ECOWITT,
  # APPLICATION_KEY, STATION_MAC, FLASK_SECRET_KEY, API_ACCESS_KEY.

handlers:
- url: /static
  static_dir: static

- url: /.*
  script: auto